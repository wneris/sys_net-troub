name: Lint

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: actionlint
        run: |
          set -euo pipefail
          ver="1.7.12"
          curl -fsSL "https://raw.githubusercontent.com/rhysd/actionlint/v${ver}/scripts/download-actionlint.bash" | bash -s -- "${ver}"
          ./actionlint -color

      - name: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error
