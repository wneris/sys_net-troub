name: Docker Build and Publish

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: troubleshooting

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/troubleshooting:latest .

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/troubleshooting:latest